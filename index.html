<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Family Memories ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to bottom,#000000,#8b0000);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

h1{
    margin-top:30px;
    font-size:40px;
}

p{
    font-size:18px;
    margin:15px;
}

.music{
    margin:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid white;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.heart{
    position:fixed;
    top:-20px;
    animation:fall linear infinite;
    font-size:25px;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(100vh);
    }
}

footer{
    padding:20px;
    font-size:18px;
}
</style>

</head>

<body>

<h1>Our Family Memories ❤️</h1>

<p>
A place filled with love, laughter and unforgettable moments 🥰
</p>

<div class="music">
<audio controls autoplay loop>
    <source src="Family.mp3" type="audio/mpeg">
</audio>
</div>


<div class="gallery">

<img src="photo1.png">

<img src="photo12.png">
<img src="photo13.png">
<img src="photo14.png">
<img src="photo15.png">
<img src="photo16.png">
<img src="photo17.png">
<img src="photo18.png">
<img src="photo19.png">
<img src="photo20.png">
<img src="photo21.png">
<img src="photo22.png">
<img src="photo23.png">
<img src="photo24.png">
<img src="photo25.png">
<img src="photo26.png">
<img src="photo27.png">
<img src="photo28.png">
<img src="photo29.png">
<img src="photo30.png">
<img src="photo31.png">
<img src="photo32.png">
<img src="photo33.png">
<img src="photo34.png">

</div>


<footer>
Made with ❤️ for our family
</footer>


<script>

setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);

},500);

</script>

</body>
  </html>
