    <!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Family Memories ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Georgia",serif;
}

body{
background:linear-gradient(135deg,#000,#8b0000);
height:100vh;
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.book{
width:90%;
max-width:450px;
background:#fff5e6;
color:#300;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 30px black;
}

h1{
font-size:35px;
margin-bottom:20px;
}

h2{
font-size:30px;
}

p{
font-size:18px;
margin:20px;
}

button{
background:#8b0000;
color:white;
border:none;
padding:15px 25px;
border-radius:30px;
font-size:18px;
margin:10px;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}

#memory{
display:none;
}

.photo{
width:100%;
height:400px;
object-fit:cover;
border-radius:15px;
border:5px solid #8b0000;
}

.page{
font-size:18px;
margin-top:15px;
}

.hearts{
position:absolute;
font-size:25px;
animation:fall 5s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-100px);
}

100%{
transform:translateY(100vh);
}

}

</style>

</head>


<body>


<div class="book" id="cover">

<h1>❤️ Our Family ❤️</h1>

<h2>Memory Book 📖</h2>

<p>
A book full of love, laughter and unforgettable moments.
</p>

<button onclick="openBook()">
Tap to see memories ✨
</button>

</div>



<div class="book" id="memory">

<img class="photo" id="picture" src="photo1.png">

<div class="page" id="count">
Memory 1 of 34
</div>


<button onclick="back()">
⬅ Back
</button>

<button onclick="next()">
Next ➡
</button>


</div>



<audio id="song" loop>
<source src="Family.mp3" type="audio/mpeg">
</audio>



<script>

let number = 1;


function openBook(){

document.getElementById("cover").style.display="none";
document.getElementById("memory").style.display="block";

document.getElementById("song").play();

createHearts();

}



function next(){

if(number < 34){

number++;

}

changePhoto();

}



function back(){

if(number > 1){

number--;

}

changePhoto();

}



function changePhoto(){

document.getElementById("picture").src=
"photo"+number+".png";

document.getElementById("count").innerHTML=
"Memory "+number+" of 34";

}



function createHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="hearts";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(3+Math.random()*4)+"s";

document.body.appendChild(heart);


setTimeout(()=>{

heart.remove();

},6000);


},700);

}

</script>


</body>
</html>
